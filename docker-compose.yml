services:
  db:
    image: postgres:15-alpine
    container_name: notes_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - notes_db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: notes_backend
    depends_on:
      - db
    environment:
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - backend_node_modules:/usr/src/app/node_modules

    working_dir: /usr/src/app
    command: sh -c "npm install --legacy-peer-deps && npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    ports:
      - "${BACKEND_PORT}:3000"
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /usr/src/app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./backend/package.json

  frontend:
    build:
      context: ./frontend
    container_name: notes_frontend
    environment:
      VITE_BACKEND_URL: http://localhost:${BACKEND_PORT}/api
    volumes:
      - frontend_node_modules:/usr/src/app/node_modules

    working_dir: /usr/src/app
    command: sh -c "npm install --legacy-peer-deps && npm run dev"
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    develop:
      watch:
        - action: sync
          path: ./frontend
          target: /usr/src/app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./frontend/package.json

volumes:
  notes_db_data:
  backend_node_modules:
  frontend_node_modules: